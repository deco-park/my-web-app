name: CI/CD (Docker Build and Push to Hub)

# main 브랜치에 코드가 푸시되면 자동으로 작동합니다
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. 깃허브 저장소에 올라온 소스 코드를 로봇 컴퓨터로 다운로드
    - name: Checkout source code
      uses: actions/checkout@v4

    # 2. 깃허브 금고(Secrets)에 넣어둔 정보를 꺼내서 Docker Hub에 로그인
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    # 3. Docker 빌드를 위한 최적화 환경 세팅
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 4. 이미지를 구워서 내 도커 허브 무료 창고로 자동 업로드(Push)
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        # 내 도커 허브 저장소에 'my-web-page'라는 방을 만들고 v1 이라는 라벨을 붙여 저장합니다
        tags: decopark/my-web-page:v1

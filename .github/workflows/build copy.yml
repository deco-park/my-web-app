# 1. 이 자동화 로봇의 이름
name: CI (Docker Image Build Test)

# 2. 로봇이 언제 발동할지 트리거(Trigger) 조건 설정
on:
  push:
    branches: [ "main" ]  # main 브랜치에 코드가 푸시될 때마다 발동!

# 3. 로봇이 해야 할 일들의 목록 (Job)
jobs:
  build-and-test:
    # 깃허브가 제공하는 클라우드 컴퓨터(최신 우분투)를 한 대 빌립니다.
    runs-on: ubuntu-latest

    # 그 컴퓨터 안에서 실행할 순서(Steps)
    steps:
    # (1) 레포지토리에 방금 푸시된 따끈따끈한 소스 코드를 이 클라우드 컴퓨터로 다운로드합니다.
    - name: Checkout source code
      uses: actions/checkout@v4

    # (2) 가상머신 내부에 Docker 환경이 갖춰져 있는지 확인하고 빌드할 준비를 합니다.
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # (3) 우리가 어제 터미널에 쳤던 바로 그 'docker build' 명령어를 로봇이 대신 실행합니다.
    - name: Build Docker Image
      run: |
        docker build -t my-web-page:latest .
        echo "🎉 Docker Image Build successfully completed by Robot!"
